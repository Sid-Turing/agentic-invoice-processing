<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Invoice Agent</title>
<style>
  :root {
    --bg: #0f1117; --panel: #171a21; --panel2: #1e222b; --line: #2a2f3a;
    --text: #e6e8ee; --muted: #9aa3b2; --accent: #6ea8fe;
    --green: #3fb950; --amber: #d29922; --red: #f85149; --grey: #6e7681;
  }
  * { box-sizing: border-box; }
  body { margin: 0; font: 15px/1.5 -apple-system, Segoe UI, Roboto, sans-serif; background: var(--bg); color: var(--text); }
  header { padding: 14px 20px; border-bottom: 1px solid var(--line); font-weight: 600; }
  header small { color: var(--muted); font-weight: 400; margin-left: 8px; }
  #chat { max-width: 820px; margin: 0 auto; padding: 20px 16px 160px; }
  .msg { margin: 18px 0; }
  .role { font-size: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: .04em; margin-bottom: 6px; }
  .bubble { background: var(--panel); border: 1px solid var(--line); border-radius: 12px; padding: 12px 14px; white-space: pre-wrap; }
  .user .bubble { background: var(--panel2); }
  .flow { display: flex; flex-direction: column; gap: 8px; }
  .step { font-size: 13px; color: var(--muted); display: flex; align-items: center; gap: 8px; }
  .step .dot { color: var(--accent); }
  .step b { color: var(--accent); font-weight: 600; }
  .tblock { background: var(--panel); border: 1px solid var(--line); border-radius: 12px; padding: 12px 14px; white-space: pre-wrap; }
  .attach { font-size: 12px; color: var(--muted); }
  .card { margin-top: 12px; border: 1px solid var(--line); border-radius: 12px; overflow: hidden; }
  .card .top { display: flex; align-items: center; gap: 10px; padding: 10px 14px; background: var(--panel2); }
  .pill { font-weight: 700; font-size: 13px; padding: 3px 10px; border-radius: 999px; }
  .pill.APPROVED { background: rgba(63,185,80,.15); color: var(--green); }
  .pill.NEEDS_REVIEW { background: rgba(210,153,34,.15); color: var(--amber); }
  .card .meta { color: var(--muted); font-size: 12px; }
  .checks { list-style: none; margin: 0; padding: 6px 14px 12px; }
  .checks li { display: flex; gap: 8px; padding: 3px 0; font-size: 14px; }
  .st { width: 62px; font-size: 12px; font-weight: 600; }
  .st.pass { color: var(--green); } .st.fail { color: var(--red); } .st.skipped { color: var(--grey); }
  .cname { color: var(--text); } .cdetail { color: var(--muted); }
  form { position: fixed; bottom: 0; left: 0; right: 0; background: var(--bg); border-top: 1px solid var(--line); }
  .bar { max-width: 820px; margin: 0 auto; padding: 12px 16px; display: flex; gap: 8px; align-items: flex-end; }
  textarea { flex: 1; resize: none; background: var(--panel); color: var(--text); border: 1px solid var(--line);
             border-radius: 10px; padding: 10px 12px; font: inherit; min-height: 44px; max-height: 140px; }
  .files { display: flex; flex-direction: column; gap: 4px; font-size: 12px; color: var(--muted); }
  .files label { cursor: pointer; }
  .files input { display: none; }
  .fname { color: var(--accent); }
  button { background: var(--accent); color: #08101f; border: 0; border-radius: 10px; padding: 0 18px;
           height: 44px; font-weight: 700; cursor: pointer; }
  button:disabled { opacity: .5; cursor: default; }
  .hint { max-width: 820px; margin: 0 auto; padding: 0 16px 10px; color: var(--muted); font-size: 12px; }
</style>
</head>
<body>
<header>Invoice Agent <small>upload an invoice (and optional PO) — the agent extracts, validates, reconciles, decides</small></header>
<div id="chat"></div>

<form id="form">
  <div class="bar">
    <div class="files">
      <label>📄 Invoice: <span id="invName" class="fname">none</span><input id="invoice" type="file" accept=".pdf,.png,.jpg,.jpeg" /></label>
      <label>📎 PO (optional): <span id="poName" class="fname">none</span><input id="po" type="file" accept=".pdf,.png,.jpg,.jpeg" /></label>
    </div>
    <textarea id="message" placeholder="Ask something, or attach an invoice and hit Send…"></textarea>
    <button id="send" type="submit">Send</button>
  </div>
  <div class="hint" id="hint">New conversation.</div>
</form>

<script>
const chat = document.getElementById('chat');
const form = document.getElementById('form');
const invoiceInput = document.getElementById('invoice');
const poInput = document.getElementById('po');
let conversationId = null;

invoiceInput.onchange = () => document.getElementById('invName').textContent = invoiceInput.files[0]?.name || 'none';
poInput.onchange = () => document.getElementById('poName').textContent = poInput.files[0]?.name || 'none';

function el(cls, html) { const d = document.createElement('div'); if (cls) d.className = cls; if (html != null) d.innerHTML = html; return d; }
function scroll() { window.scrollTo(0, document.body.scrollHeight); }

function addUserMsg(text, files) {
  const m = el('msg user');
  m.appendChild(el('role', 'You'));
  const b = el('bubble', text ? escapeHtml(text) : '<i>(process attached document)</i>');
  if (files.length) b.appendChild(el('attach', '<br>📎 ' + files.join(', ')));
  m.appendChild(b); chat.appendChild(m); scroll();
}
function escapeHtml(s){ return s.replace(/[&<>]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[c])); }

const STATUS_ICON = { pass: 'PASS', fail: 'FAIL', skipped: 'SKIP' };

function renderDecision(container, d) {
  if (!d) return;
  const card = el('card');
  const top = el('card', ''); top.className = 'top';
  top.innerHTML = `<span class="pill ${d.verdict}">${d.verdict.replace('_',' ')}</span>` +
    `<span class="meta">${d.matched_po ? 'PO ' + d.matched_po.po_number + ' (' + d.matched_po.source + ')' : 'no PO — reconciliation skipped'}` +
    ` · record ${(d.record_id||'').slice(0,8)}</span>`;
  card.appendChild(top);
  const ul = el('checks'); ul.tagName;
  const list = document.createElement('ul'); list.className = 'checks';
  (d.checks||[]).forEach(c => {
    const li = document.createElement('li');
    li.innerHTML = `<span class="st ${c.status}">${STATUS_ICON[c.status]||c.status}</span>` +
      `<span class="cname">${c.id}</span> <span class="cdetail">${escapeHtml(c.detail||'')}</span>`;
    list.appendChild(li);
  });
  card.appendChild(list);
  container.appendChild(card); scroll();
}

async function send(e) {
  e.preventDefault();
  const btn = document.getElementById('send');
  const message = document.getElementById('message').value.trim();
  const invoice = invoiceInput.files[0];
  const po = poInput.files[0];
  if (!message && !invoice) return;

  const names = []; if (invoice) names.push(invoice.name); if (po) names.push(po.name);
  addUserMsg(message, names);

  const fd = new FormData();
  fd.append('message', message);
  if (conversationId) fd.append('conversation_id', conversationId);
  if (invoice) fd.append('invoice', invoice);
  if (po) fd.append('po', po);

  // reset inputs
  document.getElementById('message').value = '';
  invoiceInput.value = ''; poInput.value = '';
  document.getElementById('invName').textContent = 'none';
  document.getElementById('poName').textContent = 'none';
  btn.disabled = true;

  // assistant message scaffold — a single timeline that interleaves steps + text
  const m = el('msg assistant');
  m.appendChild(el('role', 'Agent'));
  const flow = el('flow'); m.appendChild(flow);
  chat.appendChild(m); scroll();

  let currentText = null;                 // open text block, or null after a tool interrupts
  function addTool(name) {
    if (!name) return;
    currentText = null;                   // next text starts a fresh block below this step
    const s = el('step', `<span class="dot">🔧</span> called <b>${name}</b>`);
    flow.appendChild(s); scroll();
  }
  function addToken(text) {
    if (!currentText) { currentText = el('tblock', ''); flow.appendChild(currentText); }
    currentText.textContent += text; scroll();
  }

  try {
    const resp = await fetch('/chat/stream', { method: 'POST', body: fd });
    const reader = resp.body.getReader();
    const dec = new TextDecoder();
    let buf = '';
    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buf += dec.decode(value, { stream: true });
      const blocks = buf.split('\n\n'); buf = blocks.pop();
      for (const block of blocks) {
        let ev = null, data = null;
        for (const line of block.split('\n')) {
          if (line.startsWith('event: ')) ev = line.slice(7);
          else if (line.startsWith('data: ')) { try { data = JSON.parse(line.slice(6)); } catch { data = null; } }
        }
        if (ev === 'meta' && data) { conversationId = data.conversation_id; document.getElementById('hint').textContent = 'Conversation ' + conversationId.slice(0,8); }
        else if (ev === 'tool' && data) addTool(data.name);
        else if (ev === 'token' && data) addToken(data.text);
        else if (ev === 'decision') renderDecision(m, data);
        else if (ev === 'error' && data) addToken('\n[error] ' + data.detail);
      }
    }
  } catch (err) {
    bubble.textContent += '\n[connection error] ' + err;
  } finally {
    btn.disabled = false;
  }
}
form.addEventListener('submit', send);
document.getElementById('message').addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); form.requestSubmit(); }
});
</script>
</body>
</html>
